<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Autism Compass">
  <defs>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#234b73"/>
      <stop offset="1" stop-color="#16324f"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5ea0a5"/>
      <stop offset="1" stop-color="#3f7d82"/>
    </linearGradient>
  </defs>
  <!-- outer ring -->
  <circle cx="100" cy="100" r="86" fill="none" stroke="#16324f" stroke-width="6"/>
  <circle cx="100" cy="100" r="66" fill="none" stroke="#c9d3da" stroke-width="3"/>
  <!-- cardinal dots -->
  <g fill="#16324f">
    <circle cx="100" cy="20" r="6"/><circle cx="100" cy="180" r="6"/>
    <circle cx="20" cy="100" r="6"/><circle cx="180" cy="100" r="6"/>
  </g>
  <!-- inner tick dots -->
  <g fill="#5ea0a5">
    <circle cx="100" cy="40" r="4"/><circle cx="100" cy="160" r="4"/>
    <circle cx="40" cy="100" r="4"/><circle cx="160" cy="100" r="4"/>
    <circle cx="146" cy="54" r="3"/><circle cx="54" cy="146" r="3"/>
    <circle cx="146" cy="146" r="3"/><circle cx="54" cy="54" r="3"/>
  </g>
  <!-- vertical compass needle (navy front, teal back) -->
  <polygon points="100,34 112,100 100,118 88,100" fill="url(#navy)"/>
  <polygon points="100,166 112,100 100,82 88,100" fill="url(#teal)"/>
  <!-- horizontal compass needle (teal) -->
  <polygon points="34,100 100,112 118,100 100,88" fill="url(#teal)" opacity="0.92"/>
  <polygon points="166,100 100,112 82,100 100,88" fill="url(#navy)" opacity="0.92"/>
  <!-- infinity (centre) -->
  <path d="M78 100c0-9 7-15 15-15 6 0 9 4 14 8l14 12c5 4 8 8 14 8 8 0 15-6 15-15s-7-15-15-15c-6 0-9 4-14 8l-14 12c-5 4-8 8-14 8-8 0-15-6-15-15z"
        fill="none" stroke="#3f7d82" stroke-width="7" stroke-linecap="round" transform="scale(0.78) translate(28 28)"/>
</svg>

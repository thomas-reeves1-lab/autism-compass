<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/brand/autism-compass-mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#071a36" />
    <link rel="manifest" href="%BASE_URL%manifest.json" />
    <!-- iOS PWA: standalone display, branded status bar, home-screen title -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Autism Compass" />
    <link rel="apple-touch-icon" href="%BASE_URL%brand/autism-compass-mark.svg" />
    <!-- Preconnect for Google Fonts — DNS resolution starts before CSS parse -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fonts loaded as HTML <link> (non-render-blocking) instead of CSS @import -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;0,900;1,400&family=Roboto+Flex:opsz,wght@8..144,700;8..144,900&display=swap" />
    <title>ASD Clinical Metrics &amp; Guidance Tool — Autism Compass (education only)</title>
    <meta
      name="description"
      content="A calm, family-friendly way to understand what published studies found about common ASD behaviour and supplement pathways. Education only, not medical advice."
    />
    <meta name="robots" content="index, follow" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ASD Clinical Metrics & Guidance Tool — Autism Compass" />
    <meta
      property="og:description"
      content="Understand studied options, therapies, sensory supports, risks, and behaviour tracking. Education only. Not medical advice."
    />
    <meta property="og:image" content="/brand/autism-compass-mark.svg" />
    <meta property="og:locale" content="en_AU" />
    <!-- Structured data: this is health information, clearly labelled education-only -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "MedicalWebPage",
        "name": "AutismCompass",
        "about": "Educational summary of published research on ASD behaviour medication and supplement pathways",
        "audience": "Families and carers",
        "disclaimer": "Education only. Not medical advice. Not a diagnosis or dosing tool. Always speak to the treating doctor."
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Does this tool give medical advice?",
            "acceptedAnswer": { "@type": "Answer", "text": "No. It is an education tool that summarises published studies. Always speak to the treating doctor before changing anything." }
          },
          {
            "@type": "Question",
            "name": "Can a supplement treat autism?",
            "acceptedAnswer": { "@type": "Answer", "text": "No supplement is approved to treat autism. The tool shows what studies reported and is not a recommendation to take anything. Speak to your doctor or pharmacist." }
          },
          {
            "@type": "Question",
            "name": "Who built Autism Compass?",
            "acceptedAnswer": { "@type": "Answer", "text": "A registered NDIS provider and a registered nurse, as an education project for families." }
          },
          {
            "@type": "Question",
            "name": "Is my information private?",
            "acceptedAnswer": { "@type": "Answer", "text": "Your tracker data stays on your device unless you export it. Anonymous analytics only run if you choose to allow them." }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="font-family:system-ui,sans-serif;padding:2rem;max-width:40rem;margin:auto;color:#1f2937;">
        <h1 style="font-size:1.5rem;font-weight:900;">Autism Compass requires JavaScript</h1>
        <p>Please enable JavaScript to use this education tool. All data stays on your device &mdash; JavaScript is only needed to run the interactive calculator.</p>
        <p style="font-size:0.85rem;color:#6b7280;">Education only &middot; Not medical advice &middot; Always speak to the treating doctor.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="Autism Compass">
  <defs>
    <linearGradient id="acNavy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a5681"/>
      <stop offset="1" stop-color="#143049"/>
    </linearGradient>
    <linearGradient id="acTeal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#62a6ab"/>
      <stop offset="1" stop-color="#3d7d82"/>
    </linearGradient>
  </defs>

  <!-- outer ring -->
  <circle cx="48" cy="48" r="42" fill="#ffffff"/>
  <circle cx="48" cy="48" r="42" fill="none" stroke="#143049" stroke-width="3.2"/>

  <!-- cardinal ticks -->
  <g fill="#143049">
    <circle cx="48" cy="11" r="2.6"/><circle cx="48" cy="85" r="2.6"/>
    <circle cx="11" cy="48" r="2.6"/><circle cx="85" cy="48" r="2.6"/>
  </g>

  <!-- compass star: vertical needle -->
  <polygon points="48,16 53,48 48,53 43,48" fill="url(#acNavy)"/>
  <polygon points="48,80 53,48 48,43 43,48" fill="url(#acTeal)"/>
  <!-- horizontal needle -->
  <polygon points="16,48 48,53 53,48 48,43" fill="url(#acTeal)"/>
  <polygon points="80,48 48,53 43,48 48,43" fill="url(#acNavy)"/>

  <!-- centre infinity -->
  <path d="M40 48c0-4 3-7 7-7 3 0 4.5 2 6.5 4l3 3c2 2 3.5 4 6.5 4 4 0 7-3 7-7s-3-7-7-7c-3 0-4.5 2-6.5 4l-3 3c-2 2-3.5 4-6.5 4-4 0-7-3-7-7z"
        fill="none" stroke="#3d7d82" stroke-width="3.4" stroke-linecap="round"
        transform="translate(-7 0) scale(0.86) translate(8 7.5)"/>
  <circle cx="48" cy="48" r="2.4" fill="#143049"/>
</svg>
